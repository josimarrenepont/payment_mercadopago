spring.profiles.active=dev
spring.application.name=payment

# Isso lerá a variável do Docker ou usará MOCK_TOKEN se o Spring não achar nada
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:MOCK_TOKEN}

# Configurações do Banco (Garanta que combinem com o Docker)
spring.datasource.url=jdbc:mysql://mysql:3306/mydatabase?createDatabaseIfNotExist=true
spring.datasource.username=myuser
spring.datasource.password=secret
spring.jpa.hibernate.ddl-auto=update