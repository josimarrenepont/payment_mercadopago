spring.application.name=payment

order.service.url=http://localhost:8080  # URL do serviço de Order

# Token (com fallback)
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN:MOCK_TOKEN}

# Banco
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql:3306/mydatabase?createDatabaseIfNotExist=true
spring.datasource.username=myuser
spring.datasource.password=secret

# Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Session
spring.session.jdbc.initialize-schema=always
spring.session.store-type=jdbc

# Resilience4j
resilience4j.retry.instances.mercadopago.max-attempts=3
resilience4j.retry.instances.mercadopago.wait-duration=2s
resilience4j.retry.instances.mercadopago.retry-exceptions=org.springframework.web.client.HttpServerErrorException